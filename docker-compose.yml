services:
  # PostgreSQL数据库
  postgres:
    image: postgres:14
    container_name: eduadmin-postgres
    environment:
      POSTGRES_DB: eduadmin
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - eduadmin_net
    restart: unless-stopped

  # Redis缓存
  redis:
    image: redis:7-alpine
    container_name: eduadmin-redis
    ports:
      - "6379:6379"
    networks:
      - eduadmin_net
    restart: unless-stopped

  # Django后端
  backend:
    build:
      context: ./04_后端开发/03_业务代码
      dockerfile: Dockerfile
    container_name: eduadmin-backend
    env_file:
      - .env
    ports:
      - "8000:8000"
    environment:
      - DB_HOST=postgres
      - DB_NAME=eduadmin
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_ENGINE=postgres
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=your-secret-key-for-django-app-must-be-long-enough
      - JWT_SECRET_KEY=your-secret-key-for-jwt-token-must-be-at-least-32-chars
    depends_on:
      - postgres
      - redis
    networks:
      - eduadmin_net
    restart: unless-stopped

  # Vue3前端
  frontend:
    build:
      context: ./03_前端开发/01_管理后台
      dockerfile: Dockerfile
    container_name: eduadmin-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - eduadmin_net
    restart: unless-stopped

  teacher-portal:
    build:
      context: ./03_前端开发/02_教师端
      dockerfile: Dockerfile
    container_name: eduadmin-teacher-portal
    ports:
      - "3001:80"
    depends_on:
      - backend
    networks:
      - eduadmin_net
    restart: unless-stopped

  student-portal:
    build:
      context: ./03_前端开发/03_学生端
      dockerfile: Dockerfile
    container_name: eduadmin-student-portal
    ports:
      - "3002:80"
    depends_on:
      - backend
    networks:
      - eduadmin_net
    restart: unless-stopped

  parent-portal:
    build:
      context: ./03_前端开发/04_家长端
      dockerfile: Dockerfile
    container_name: eduadmin-parent-portal
    ports:
      - "3003:80"
    depends_on:
      - backend
    networks:
      - eduadmin_net
    restart: unless-stopped

  # Prometheus监控
  prometheus:
    image: prom/prometheus:latest
    container_name: eduadmin-prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - eduadmin_net
    restart: unless-stopped

  # Grafana可视化
  grafana:
    image: grafana/grafana:latest
    container_name: eduadmin-grafana
    ports:
      - "3004:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - eduadmin_net
    restart: unless-stopped

volumes:
  postgres_data:
  grafana_data:

networks:
  eduadmin_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/24
